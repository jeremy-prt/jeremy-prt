name: Update Tech Stack

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 generate-stack.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tech-stack.svg
          git diff --staged --quiet || git commit -m "Chore : mise à jour tech stack"
          git push
